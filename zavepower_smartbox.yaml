# Zavepower SmartBox example config
# Hardware: elysics "Pool Sweden SmartBox" PCBA (board marking EB00174-B),
#           ESP32-S3-WROOM-1.
#
# Before flashing, replace the pin values in `substitutions` below with the
# values confirmed using the discovery firmware (see README "Zavepower SmartBox").
# Put your real WiFi credentials in secrets.yaml (wifi_ssid / wifi_password).

substitutions:
  device_name: zavepower-spa
  # --- Pins confirmed via the discovery firmware (2026-07-03) ---
  spa_rx_pin: GPIO44       # from zavepower_uart_discovery.yaml
  spa_tx_pin: GPIO43       # from zavepower_uart_discovery.yaml
  green_led_pin: GPIO17    # single LED — OK / power indicator
  red_led_pin: GPIO18      # single LED — fault / error indicator
  rgb_red_pin: GPIO2       # discrete RGB LED — red channel
  rgb_green_pin: GPIO42    # discrete RGB LED — green channel
  rgb_blue_pin: GPIO1      # discrete RGB LED — blue channel

esphome:
  name: ${device_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Green single LED = OK indicator: on when connected, off when not.
  on_connect:
    - output.turn_on: green_led
  on_disconnect:
    - output.turn_off: green_led

api:

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: homeassistant_time

external_components:
  - source:
      type: git
      url: https://github.com/brianfeucht/esphome-balboa-spa
      ref: main

uart:
  id: spa_uart_bus
  rx_pin: ${spa_rx_pin}
  tx_pin: ${spa_tx_pin}
  data_bits: 8
  parity: NONE
  stop_bits: 1
  baud_rate: 115200
  rx_buffer_size: 512

balboa_spa:
  id: spa
  # Set this to C or F based on the units your spa is configured for.
  spa_temp_scale: F

# --- Onboard LEDs (pins confirmed via discovery) ---
# Red single LED = fault/error indicator. ESPHome's status_led lights/blinks
# it on warnings and errors (e.g. WiFi/API problems), off when healthy.
status_led:
  pin:
    number: ${red_led_pin}
    inverted: false

output:
  # Green single LED = OK/power indicator, driven from the wifi
  # on_connect / on_disconnect automations above.
  - platform: gpio
    pin:
      number: ${green_led_pin}
      inverted: false
    id: green_led
  # Discrete RGB LED — one PWM (ledc) channel per color.
  # If colors look inverted (lit when they should be off), the LED is
  # common-anode: set inverted: true on all three channels.
  - platform: ledc
    pin: ${rgb_red_pin}
    id: rgb_red
  - platform: ledc
    pin: ${rgb_green_pin}
    id: rgb_green
  - platform: ledc
    pin: ${rgb_blue_pin}
    id: rgb_blue

# Full-color RGB LED exposed to Home Assistant.
light:
  - platform: rgb
    name: "Status RGB"
    red: rgb_red
    green: rgb_green
    blue: rgb_blue

# --- Representative spa entities. The full set of available entities is in
#     test_balboa_spa_component.yaml. ---
climate:
  - platform: balboa_spa
    balboa_spa_id: spa
    name: "Spa Thermostat"
    visual:
      min_temperature: 62 °F
      max_temperature: 105 °F
      temperature_step: 0.5 °F

switch:
  - platform: balboa_spa
    balboa_spa_id: spa
    jet1:
      name: "Jet 1"
    light:
      name: "Lights"

binary_sensor:
  - platform: balboa_spa
    balboa_spa_id: spa
    connected:
      name: "Spa Connected"
    heatstate:
      name: "Heating"

text_sensor:
  - platform: balboa_spa
    balboa_spa_id: spa
    spa_time:
      name: "Spa Time"
    fault_message:
      name: "Fault Message"

button:
  - platform: balboa_spa
    balboa_spa_id: spa
    sync_time:
      name: "Sync Spa Time"

# --- Optional: make the RGB light track spa state instead of being manual ---
# e.g. turn it red while the heater is running. Drive the rgb channels from a
# balboa_spa binary_sensor's on_state (this would replace manual HA control):
# binary_sensor:
#   - platform: balboa_spa
