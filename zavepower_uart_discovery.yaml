# Zavepower SmartBox (ESP32-S3-WROOM-1) — Spa UART pin discovery
#
# RESULT (confirmed on the EB00174 board, 2026-07-03): the spa UART is
#   RX = GPIO18, TX = GPIO17, direction/flow-control = GPIO6
# These were found by continuity-probing the Analog Devices ADM3483 RS-485
# transceiver (RO pin1 -> RX, DI pin4 -> TX, /RE+DE -> GPIO6), NOT by this
# edit-and-watch loop. GPIO17/18 double as the green/red TX/RX activity LEDs.
# This file is kept as a reference method for other board revisions.
#
# Method (UART pins can't be swept at runtime, so it's an edit-and-watch loop):
#   1. Set spa_rx_pin / spa_tx_pin below to a candidate pair.
#   2. Flash + watch logs:  esphome run zavepower_uart_discovery.yaml
#   3. Correct pins -> valid frames in the DEBUG log and "Connected" turns ON.
#      Wrong pins -> silence or CRC/garbage. Try the next pair (and swap RX/TX).

substitutions:
  spa_rx_pin: GPIO18
  spa_tx_pin: GPIO17
  spa_de_pin: GPIO6

esphome:
  name: zavepower-uart-discovery
  build_path: .build/zavepower_uart_discovery

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

# WiFi/API/OTA let you watch discovery logs over the network and re-flash
# without USB. NOTE: the very first flash must still be over USB-C, and USB
# logs remain the more reliable observer during pin discovery.
# Put credentials in secrets.yaml (wifi_ssid / wifi_password).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: components

uart:
  id: spa_uart_bus
  rx_pin: ${spa_rx_pin}
  tx_pin: ${spa_tx_pin}
  flow_control_pin: ${spa_de_pin}   # ADM3483 half-duplex direction (/RE + DE)
  data_bits: 8
  parity: NONE
  stop_bits: 1
  baud_rate: 115200
  rx_buffer_size: 512

balboa_spa:
  id: spa
  spa_temp_scale: F

binary_sensor:
  - platform: balboa_spa
    balboa_spa_id: spa
    connected:
      name: "Spa Connected"
